<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <meta name="description" content="JHOP EXPRESS — Conectamos talento con oportunidades en Mérida, Yucatán y México.">
    <meta name="theme-color" content="#0a0a0a">

    <!-- Open Graph -->
    <meta property="og:title"       content="JHOP EXPRESS">
    <meta property="og:description" content="Plataforma de empleo rápido y directo.">
    <meta property="og:type"        content="website">
    <meta property="og:url"         content="https://www.jhopexpress.com">

    <title>JHOP EXPRESS — Empleo Rápido</title>

    <style>
        /* ─── RESET ─── */
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            width: 100%;
            overflow: hidden;
            background: #0a0a0a;
            font-family: 'Courier New', Courier, monospace;
        }

        /* ─── IFRAME APP ─── */
        #app-frame {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

        /* ─── SPLASH SCREEN ─── */
        #splash {
            position: fixed;
            inset: 0;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 28px;
            background: #0a0a0a;
            overflow: hidden;

            /* Fade out con clase .ocultar */
            opacity: 1;
            transition: opacity 0.9s cubic-bezier(0.4, 0, 0.2, 1);
        }

        #splash.ocultar {
            opacity: 0;
            pointer-events: none;
        }

        /* Fondo con líneas de velocidad */
        #splash::before {
            content: '';
            position: absolute;
            inset: -50%;
            background: repeating-linear-gradient(
                90deg,
                transparent,
                transparent 120px,
                rgba(255, 165, 0, 0.03) 120px,
                rgba(255, 165, 0, 0.03) 121px
            );
            animation: mover-lineas 1.2s linear infinite;
        }

        @keyframes mover-lineas {
            0%   { transform: translateX(0); }
            100% { transform: translateX(121px); }
        }

        /* ─── LOGO ─── */
        .splash-logo {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
        }

        .splash-icono {
            width: 72px;
            height: 72px;
            animation: pulso 1.6s ease-in-out infinite;
        }

        @keyframes pulso {
            0%, 100% { transform: scale(1);    opacity: 1; }
            50%       { transform: scale(1.08); opacity: 0.85; }
        }

        .splash-nombre {
            font-size: clamp(2.2rem, 8vw, 4rem);
            font-weight: 900;
            letter-spacing: 0.12em;
            color: #fff;
            text-transform: uppercase;

            /* Efecto gradiente naranja–blanco */
            background: linear-gradient(90deg, #ff8c00 0%, #ffd700 40%, #fff 70%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;

            animation: texto-entrada 0.6s ease both;
        }

        @keyframes texto-entrada {
            from { transform: translateY(18px); opacity: 0; }
            to   { transform: translateY(0);    opacity: 1; }
        }

        .splash-tagline {
            font-size: clamp(0.65rem, 2.5vw, 0.85rem);
            letter-spacing: 0.35em;
            color: rgba(255, 165, 0, 0.7);
            text-transform: uppercase;
            animation: texto-entrada 0.6s 0.15s ease both;
        }

        /* ─── BARRA DE CARGA ─── */
        .barra-contenedor {
            width: min(320px, 80vw);
            display: flex;
            flex-direction: column;
            gap: 8px;
            animation: texto-entrada 0.6s 0.25s ease both;
        }

        .barra-track {
            width: 100%;
            height: 3px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            overflow: hidden;
        }

        .barra-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #ff8c00, #ffd700);
            border-radius: 2px;
            box-shadow: 0 0 12px rgba(255, 165, 0, 0.6);
            transition: width 0.08s linear;
        }

        .barra-label {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.65rem;
            letter-spacing: 0.2em;
            color: rgba(255, 255, 255, 0.4);
        }

        .barra-pct {
            color: rgba(255, 165, 0, 0.8);
            font-weight: 700;
        }

        /* ─── URL BADGE ─── */
        .splash-url {
            position: absolute;
            bottom: 28px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.7rem;
            letter-spacing: 0.15em;
            color: rgba(255, 255, 255, 0.25);
            white-space: nowrap;
            animation: texto-entrada 0.6s 0.4s ease both;
        }

        .splash-url span {
            color: rgba(255, 165, 0, 0.5);
        }

        /* ─── PUNTOS DE ESTADO ─── */
        .estado-dots {
            display: flex;
            gap: 6px;
            margin-top: 4px;
        }

        .estado-dots span {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: rgba(255, 165, 0, 0.3);
        }

        .estado-dots span.activo {
            background: #ffa500;
            box-shadow: 0 0 6px rgba(255, 165, 0, 0.8);
            animation: parpadeo 0.5s ease infinite alternate;
        }

        @keyframes parpadeo {
            from { opacity: 0.5; }
            to   { opacity: 1; }
        }

    </style>
</head>
<body>

    <!-- APP PRINCIPAL (iframe) -->
    <iframe
        id="app-frame"
        src="https://plataforma-web-jhop-xpres.onrender.com"
        title="JHOP EXPRESS — Plataforma de empleo"
        loading="eager"
        allow="geolocation; camera; microphone"
    ></iframe>

    <!-- SPLASH SCREEN -->
    <div id="splash" role="status" aria-label="Cargando JHOP EXPRESS">

        <!-- Logo + nombre -->
        <div class="splash-logo">

            <!-- SVG icono: rayo + flecha express -->
            <svg class="splash-icono" viewBox="0 0 72 72" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                <defs>
                    <linearGradient id="g1" x1="0" y1="0" x2="72" y2="72" gradientUnits="userSpaceOnUse">
                        <stop offset="0%"   stop-color="#ff8c00"/>
                        <stop offset="100%" stop-color="#ffd700"/>
                    </linearGradient>
                    <filter id="glow">
                        <feGaussianBlur stdDeviation="2.5" result="blur"/>
                        <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
                    </filter>
                </defs>
                <!-- Hexágono fondo -->
                <polygon points="36,4 64,20 64,52 36,68 8,52 8,20"
                    fill="rgba(255,140,0,0.08)" stroke="url(#g1)" stroke-width="1.5"/>
                <!-- Rayo -->
                <path d="M42 10 L28 36 H38 L30 62 L52 30 H40 Z"
                    fill="url(#g1)" filter="url(#glow)"/>
            </svg>

            <div class="splash-nombre">JHOP EXPRESS</div>
            <div class="splash-tagline">Empleo rápido · Mérida · México</div>
        </div>

        <!-- Barra de progreso -->
        <div class="barra-contenedor">
            <div class="barra-track">
                <div class="barra-fill" id="barra-fill"></div>
            </div>
            <div class="barra-label">
                <span>INICIANDO SISTEMA</span>
                <span class="barra-pct" id="barra-pct">0%</span>
            </div>
            <div class="estado-dots">
                <span id="dot1"></span>
                <span id="dot2"></span>
                <span id="dot3"></span>
            </div>
        </div>

        <!-- URL en footer del splash -->
        <div class="splash-url">
            <span>www.</span>JHOPEXPRESS<span>.com</span>
        </div>
    </div>

    <!-- AdSense (async — no bloquea) -->
    <script
        async
        src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6606043599842670"
        crossorigin="anonymous"
    ></script>

    <script>
        (function () {
            'use strict';

            const splash   = document.getElementById('splash');
            const barraFill= document.getElementById('barra-fill');
            const barraPct = document.getElementById('barra-pct');
            const dots     = [
                document.getElementById('dot1'),
                document.getElementById('dot2'),
                document.getElementById('dot3')
            ];

            // ── Animar barra de progreso ──
            const DURACION_MS  = 2200;   // duración total del splash
            const INTERVALO_MS = 40;     // fps de la barra

            let progreso   = 0;
            let dotActual  = 0;
            const pasos    = DURACION_MS / INTERVALO_MS;
            const incremento = 100 / pasos;

            function activarDot(i) {
                dots.forEach((d, idx) => {
                    d.classList.toggle('activo', idx === i);
                });
            }

            activarDot(0);

            const timer = setInterval(() => {
                progreso = Math.min(progreso + incremento, 100);

                barraFill.style.width = progreso + '%';
                barraPct.textContent  = Math.floor(progreso) + '%';

                // Avanzar dot según progreso
                if (progreso >= 33 && dotActual < 1) { dotActual = 1; activarDot(1); }
                if (progreso >= 66 && dotActual < 2) { dotActual = 2; activarDot(2); }

                if (progreso >= 100) {
                    clearInterval(timer);
                    barraPct.textContent = '100%';

                    // Marcar todos los dots activos brevemente
                    dots.forEach(d => d.classList.add('activo'));

                    // Fade out del splash
                    setTimeout(() => {
                        splash.classList.add('ocultar');

                        // Remover del DOM después del fade
                        splash.addEventListener('transitionend', () => {
                            splash.remove();
                        }, { once: true });
                    }, 180);
                }
            }, INTERVALO_MS);

        })();
    </script>

</body>
</html>
